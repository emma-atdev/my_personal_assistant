# 로컬 MCP 서버 허용 디렉토리 설정
# 이 목록 외의 경로는 절대 접근 불가

allowed_directories:
  - path: "~/my_personal_assistant"
    access: "read"          # read | read_write
    deny:                   # 민감 파일 차단 (glob 패턴)
      - ".env"
      - ".env.*"
      - "*.key"
      - "*.pem"
      - "*.p12"
      - "*.pfx"

